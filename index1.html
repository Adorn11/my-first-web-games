<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My First Web Game</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 50px; background: #f0f0f0; }
        button { font-size: 20px; padding: 10px 20px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
        button:hover { background: #0056b3; }
        h1 { color: #333; }
    </style>
</head>
<body>

    <h1>Clicking Game</h1>
    <p>Score: <span id="score">0</span></p>
    <button onclick="increaseScore()">Click Me!</button>

    <script>
        let score = 0;
        function increaseScore() {
            score = score + 1;
            document.getElementById("score").innerText = score;
        }
    </script>

</body>
</html>
